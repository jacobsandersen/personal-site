name: Sync content submodule

on:
  repository_dispatch:
    types:
      - content-updated

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update submodule to latest remote
        run: git submodule update --init --remote --recursive
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.CONTENT_REPO_TOKEN }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/

      - name: Commit and push updated submodule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update content submodule"
          git push